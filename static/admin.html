<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — KINO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0a0a0f; --bg2:#14141c; --card:#1a1a24;
  --line:rgba(255,255,255,0.08); --txt:#f5f5f7; --dim:#9a9aa8;
  --red:#E50914; --red2:#ff2d3a; --green:#3DDC97; --blue:#2BA8FF;
}
body { background:var(--bg); color:var(--txt); font-family:'Inter',sans-serif; }

/* LOGIN */
.login-wrap { max-width:360px; margin:100px auto; padding:24px; }
.box { background:var(--bg2); border:1px solid var(--line); border-radius:16px; padding:32px; }
.box h1 { font-size:22px; margin-bottom:6px; }
.box p { color:var(--dim); font-size:14px; margin-bottom:20px; }

/* INPUTS */
input, select, textarea {
  width:100%; padding:12px 14px;
  background:var(--card); border:1px solid var(--line);
  border-radius:10px; color:var(--txt);
  font-family:inherit; font-size:15px;
  outline:none; margin-bottom:10px;
}
input:focus, select:focus, textarea:focus { border-color:var(--blue); }
textarea { resize:vertical; min-height:80px; }

/* BUTTONS */
.btn { width:100%; padding:13px; background:var(--red); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:600; font-family:inherit; cursor:pointer; }
.btn:hover { background:var(--red2); }
.btn-save { background:#1a6ef5; }
.btn-save:hover { background:#1558cc; }

/* MAIN */
.main { max-width:860px; margin:0 auto; padding:24px; }
.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.topbar h1 { font-size:20px; }
.topbar a { color:var(--dim); font-size:13px; text-decoration:none; }

/* SEARCH */
.search-row { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.search-row input { margin-bottom:0; flex:1; min-width:180px; }
.search-row select { margin-bottom:0; width:auto; min-width:120px; }
.search-row button { padding:12px 18px; background:var(--card); border:1px solid var(--line); border-radius:10px; color:var(--txt); font-family:inherit; cursor:pointer; white-space:nowrap; }
.search-row button:hover { border-color:var(--blue); }
.count { color:var(--dim); font-size:13px; margin-bottom:12px; }

/* LIST ROWS */
.row {
  background:var(--bg2); border:1px solid var(--line);
  border-radius:12px; padding:14px 16px;
  margin-bottom:8px; display:flex; align-items:center; gap:12px;
}
.row-info { flex:1; min-width:0; }
.row-title { font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row-meta { font-size:12px; color:var(--dim); margin-top:3px; }
.badge { display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:600; margin-right:4px; }
.b-series { background:rgba(43,168,255,0.15); color:var(--blue); }
.b-anime   { background:rgba(255,95,162,0.15); color:#ff5fa2; }
.b-movie   { background:rgba(229,9,20,0.15);   color:var(--red2); }
.b-cartoon { background:rgba(255,201,64,0.15);  color:#ffc940; }
.row-btns { display:flex; gap:6px; flex-shrink:0; }
.row-btns button { width:38px; height:38px; border-radius:9px; border:none; cursor:pointer; font-size:16px; }
.btn-edit { background:rgba(43,168,255,0.15); color:var(--blue); }
.btn-del  { background:rgba(255,45,58,0.15);  color:var(--red2); }
.empty { text-align:center; color:var(--dim); padding:40px; }

/* MODAL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(6px); z-index:1000; display:none; align-items:center; justify-content:center; padding:20px; }
.overlay.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--line); border-radius:16px; padding:28px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; }
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.modal-head h2 { font-size:18px; }
.modal-head button { background:none; border:none; color:var(--dim); font-size:26px; cursor:pointer; line-height:1; }
.lbl { font-size:13px; color:var(--dim); margin-bottom:5px; display:block; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* HIGHLIGHT — tahrirlayotgan qism */
.edit-highlight {
  background:rgba(43,168,255,0.06);
  border:1px solid rgba(43,168,255,0.25) !important;
}

.hidden { display:none; }
.alert { padding:10px 14px; border-radius:8px; font-size:14px; margin-top:10px; text-align:center; }
.alert-ok  { background:rgba(61,220,151,0.12); color:var(--green); }
.alert-err { background:rgba(255,45,58,0.12);  color:var(--red2); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrap">
  <div class="box">
    <h1>🎬 Kino Admin</h1>
    <p>Parolni kiriting</p>
    <input type="password" id="passInput" placeholder="Parol" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Kirish</button>
    <div id="loginErr" class="alert alert-err hidden">❌ Parol noto'g'ri</div>
  </div>
</div>

<!-- MAIN DASHBOARD -->
<div id="mainPage" class="main hidden">
  <div class="topbar">
    <h1>🎬 Kinolarni boshqarish</h1>
    <a href="/" target="_blank">↗ Saytni ochish</a>
  </div>

  <!-- QIDIRUV -->
  <div class="search-row">
    <input id="searchInput" placeholder="Serial yoki kino nomini yozing..." onkeydown="if(event.key==='Enter')search()">
    <select id="typeFilter" onchange="search()">
      <option value="">Hammasi</option>
      <option value="series">📺 Serial</option>
      <option value="anime">🌸 Anime</option>
      <option value="movie">🎬 Kino</option>
      <option value="cartoon">🧸 Multfilm</option>
    </select>
    <button onclick="search()">🔍 Qidirish</button>
  </div>
  <div class="count" id="countText"></div>
  <div id="listContainer"></div>
</div>

<!-- TAHRIRLASH MODALI -->
<div class="overlay" id="editOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h2>✏️ Tahrirlash</h2>
      <button onclick="closeModal()">×</button>
    </div>

    <input type="hidden" id="eId">

    <!-- SARLAVHA — asosiy maydon -->
    <span class="lbl">📝 Sarlavha (nomi)</span>
    <input id="eTitle" class="edit-highlight" placeholder="Masalan: Naruto 83-qism">

    <!-- QISM RAQAMI — tez o'zgartirish uchun -->
    <span class="lbl">🔢 Faqat qism raqamini o'zgartirish</span>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
      <input id="eEpFrom" type="number" placeholder="Hozirgi: 82" style="margin-bottom:0;">
      <span style="color:var(--dim);white-space:nowrap;">→</span>
      <input id="eEpTo" type="number" placeholder="Yangi: 83" style="margin-bottom:0;">
      <button onclick="applyEp()" style="padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-family:inherit;cursor:pointer;white-space:nowrap;">O'zgartir</button>
    </div>
    <div id="epHint" style="font-size:12px;color:var(--dim);margin-bottom:14px;"></div>

    <!-- QOLGAN MAYDONLAR -->
    <div class="row2">
      <div><span class="lbl">Janr</span><input id="eGenre"></div>
      <div><span class="lbl">Yil</span><input id="eYear" type="number"></div>
    </div>
    <div class="row2">
      <div><span class="lbl">Til</span><input id="eLang"></div>
      <div><span class="lbl">Sifat</span><input id="eQuality"></div>
    </div>
    <span class="lbl">Turi</span>
    <select id="eType">
      <option value="movie">🎬 Kino</option>
      <option value="series">📺 Serial</option>
      <option value="anime">🌸 Anime</option>
      <option value="cartoon">🧸 Multfilm</option>
    </select>
    <span class="lbl">Poster URL</span>
    <input id="ePoster" placeholder="https://...jpg (ixtiyoriy)">
    <span class="lbl">Tavsif</span>
    <textarea id="eDesc"></textarea>

    <button class="btn btn-save" onclick="saveEdit()">💾 Saqlash</button>
    <div id="editMsg"></div>
  </div>
</div>

<script>
let PASS = '';
const TYPE = { movie:'Kino', series:'Serial', anime:'Anime', cartoon:'Multfilm' };

// ── LOGIN ──
async function login() {
  const p = document.getElementById('passInput').value;
  const r = await fetch('/api/admin/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password: p})
  });
  const d = await r.json();
  if (d.ok) {
    PASS = p;
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    search();
  } else {
    document.getElementById('loginErr').classList.remove('hidden');
  }
}

// ── QIDIRUV ──
async function search() {
  const q    = document.getElementById('searchInput').value.trim();
  const type = document.getElementById('typeFilter').value;
  const box  = document.getElementById('listContainer');
  const cnt  = document.getElementById('countText');
  box.innerHTML = '<div class="empty">Yuklanmoqda...</div>';

  const r = await fetch('/api/admin/list', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: PASS, q, type, limit: 500 })
  });
  const d = await r.json();

  if (!d.movies || !d.movies.length) {
    cnt.textContent = '';
    box.innerHTML = '<div class="empty">Hech narsa topilmadi</div>';
    return;
  }

  cnt.textContent = d.movies.length + ' ta natija';
  box.innerHTML = d.movies.map(m => `
    <div class="row">
      <div class="row-info">
        <div class="row-title">${esc(m.title)}</div>
        <div class="row-meta">
          <span class="badge b-${m.type}">${TYPE[m.type]||'Kino'}</span>
          ${m.year||''} ${m.genre ? '· '+esc(m.genre) : ''} · 👁 ${m.views}
        </div>
      </div>
      <div class="row-btns">
        <button class="btn-edit" onclick="openEdit(${m.id})" title="Tahrirlash">✏️</button>
        <button class="btn-del"  onclick="del(${m.id}, '${esc(m.title).replace(/'/g,'')}')">🗑</button>
      </div>
    </div>`).join('');
}

// ── TAHRIRLASH OCHISH ──
async function openEdit(id) {
  document.getElementById('editMsg').innerHTML = '';
  document.getElementById('epHint').textContent = '';

  const r = await fetch('/api/admin/get', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: PASS, id })
  });
  const d = await r.json();
  if (d.error) { alert(d.error); return; }
  const m = d.movie;

  document.getElementById('eId').value      = m.id;
  document.getElementById('eTitle').value   = m.title;
  document.getElementById('eGenre').value   = m.genre;
  document.getElementById('eYear').value    = m.year;
  document.getElementById('eLang').value    = m.language;
  document.getElementById('eQuality').value = m.quality;
  document.getElementById('eType').value    = m.type;
  document.getElementById('ePoster').value  = m.poster_url || '';
  document.getElementById('eDesc').value    = m.description;

  // Sarlavhadan qism raqamini avtomatik topish
  const ep = findEp(m.title);
  document.getElementById('eEpFrom').value = ep || '';
  document.getElementById('eEpTo').value   = '';
  if (ep) {
    document.getElementById('epHint').textContent = `Sarlavhada ${ep}-qism topildi`;
  }

  document.getElementById('editOverlay').classList.add('open');
}

// ── QISM RAQAMINI O'ZGARTIRISH ──
function applyEp() {
  const from  = document.getElementById('eEpFrom').value.trim();
  const to    = document.getElementById('eEpTo').value.trim();
  const title = document.getElementById('eTitle').value;
  const hint  = document.getElementById('epHint');

  if (!to) { hint.textContent = '⚠️ Yangi raqam kiriting'; hint.style.color='#ff2d3a'; return; }

  // Sarlavhadagi raqamni almashtirish (har qanday format)
  let newTitle = title;
  if (from) {
    // "82-qism", "82 qism", "82-серия" va shunga o'xshash
    const re = new RegExp(from + '(\\s*[-–]?\\s*)(qism|серия|episode|ep\\b|part\\b)', 'i');
    if (re.test(title)) {
      newTitle = title.replace(re, to + '$1$2');
    } else {
      // Faqat raqamni almashtirish (so'z chegarasida)
      newTitle = title.replace(new RegExp('\\b' + from + '\\b'), to);
    }
  } else {
    // from kiritilmagan — sarlavhada birinchi raqamni almashtirish
    newTitle = title.replace(/\d+/, to);
  }

  document.getElementById('eTitle').value = newTitle;
  hint.textContent = `✅ Sarlavha yangilandi: "${newTitle}"`;
  hint.style.color = '#3DDC97';
}

// Sarlavhadan qism raqamini topish
function findEp(title) {
  const m = title.match(/(\d+)\s*[-–]?\s*(qism|серия|episode|ep\b|part\b)/i)
          || title.match(/(qism|серия|episode|ep\b|part\b)\s*[-–]?\s*(\d+)/i);
  if (!m) return null;
  return parseInt(m[1]) || parseInt(m[2]);
}

// ── SAQLASH ──
async function saveEdit() {
  const msg   = document.getElementById('editMsg');
  const title = document.getElementById('eTitle').value.trim();
  if (!title) { msg.innerHTML = '<div class="alert alert-err">Sarlavha bo\'sh bo\'lmasin</div>'; return; }

  msg.innerHTML = '<div class="alert">Saqlanmoqda...</div>';
  const r = await fetch('/api/admin/edit', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      password:     PASS,
      id:           document.getElementById('eId').value,
      title,
      genre:        document.getElementById('eGenre').value.trim(),
      year:         document.getElementById('eYear').value,
      language:     document.getElementById('eLang').value.trim(),
      quality:      document.getElementById('eQuality').value.trim(),
      content_type: document.getElementById('eType').value,
      poster_url:   document.getElementById('ePoster').value.trim(),
      description:  document.getElementById('eDesc').value.trim()
    })
  });
  const d = await r.json();
  if (d.ok) {
    msg.innerHTML = '<div class="alert alert-ok">✅ Saqlandi!</div>';
    setTimeout(() => { closeModal(); search(); }, 700);
  } else {
    msg.innerHTML = `<div class="alert alert-err">❌ ${d.error||'Xato'}</div>`;
  }
}

// ── O'CHIRISH ──
async function del(id, title) {
  if (!confirm('"' + title + '"\n\nO\'chirilsinmi?')) return;
  const r = await fetch('/api/admin/delete', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password: PASS, id })
  });
  const d = await r.json();
  if (d.ok) search();
  else alert(d.error || 'Xato');
}

function closeModal() { document.getElementById('editOverlay').classList.remove('open'); }
function esc(s) { return String(s==null?'':s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
